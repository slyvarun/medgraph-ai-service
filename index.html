<!DOCTYPE html>
<html>
<head>
    <title>MedGraph Nexus AI</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .chat-box { width: 400px; padding: 20px; background: #1e293b; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3b82f6; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #response { margin-top: 20px; font-size: 14px; line-height: 1.5; color: #94a3b8; }
    </style>
</head>
<body>
    <h1>🛡️ MedGraph Nexus</h1>
    <div class="chat-box">
        <input type="text" id="question" placeholder="Ask about a medicine...">
        <button onclick="ask()">Ask AI</button>
        <div id="response"></div>
    </div>
    <script>
       async function ask() {
    const out = document.getElementById('response'); // Or whatever your ID is
    out.innerText = "Consulting Knowledge Graph...";
    
    try {
        const response = await fetch('https://medgraph-ai-service.onrender.com/ask', {
            method: 'POST',
            headers: {
                'Content-Type': 'text/plain' // Tells FastAPI what is coming
            },
            body: document.getElementById('question').value
        });
        
        const data = await response.text();
        out.innerText = data;
    } catch (error) {
        out.innerText = "Error: " + error.message;
        console.error("Full Error:", error);
    }
}
    </script>
</body>
</html>
