<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedGraph Nexus | Clinical AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #0a0a0c; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-3xl w-full space-y-6">
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-bold glow-text text-blue-400">MEDGRAPH NEXUS</h1>
            <p class="text-gray-400 uppercase tracking-widest text-xs">Knowledge Graph RAG • 50k Clinical Nodes</p>
        </header>

        <div class="glass p-6 rounded-2xl shadow-2xl">
            <div id="chat-box" class="h-80 overflow-y-auto mb-4 space-y-4 pr-2 text-sm leading-relaxed">
                <div class="text-blue-300">System Ready. Awaiting clinical query...</div>
            </div>
            
            <div class="relative">
                <input type="text" id="user-input" placeholder="Ask about a drug, manufacturer, or condition..." 
                       class="w-full bg-black/50 border border-white/10 rounded-xl py-4 px-6 focus:outline-none focus:border-blue-500 transition-all text-white">
                <button onclick="askNexus()" class="absolute right-3 top-2 bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg transition-all font-bold">ASK</button>
            </div>
        </div>

        <div class="flex justify-between items-center text-[10px] text-gray-500 uppercase tracking-tighter">
            <span>Powered by Gemini 3 Flash</span>
            <span id="status-tag" class="hidden text-green-400">● Graph Retrieval Active</span>
        </div>
    </div>

    <script>
        async function askNexus() {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat-box');
            const status = document.getElementById('status-tag');
            const query = input.value;
            if(!query) return;

            chat.innerHTML += `<div class="text-white font-bold mt-4">User: ${query}</div>`;
            input.value = "";
            status.classList.remove('hidden');

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'text/plain'},
                    body: query
                });
                const data = await response.text();
                chat.innerHTML += `<div class="text-gray-300 bg-white/5 p-4 rounded-lg border-l-2 border-blue-500">Nexus: ${data}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (e) {
                chat.innerHTML += `<div class="text-red-400 italic">Error connecting to Nexus Engine.</div>`;
            }
        }
    </script>
</body>
</html>
